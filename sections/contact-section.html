<h2>Contacto</h2>

<div class="section-content">
    <form id="_contact-form" action="https://formspree.io/f/ConctactForm" class="contact-form" target="_top" method="POST">
        <div class="form-field">
            <label class="form-label" for="name">Tu nombre:</label>
            <input class="form-input" id="name" name="name" required />
        </div>
        <div class="fs-field">
            <label class="form-label" for="email">Correo electrónico</label>
            <input class="form-input" id="email" name="email" required />
        </div>
        <div class="fs-field">
            <label class="form-label" for=Mensaje">Message</label>
            <textarea class="form-textarea" id="message" name="message" required></textarea>
        </div>
        <div class="">
            <label class="form-label-x" for=Mensaje">Message</label>
            <input class="form-input-x" id="age" name="age"/>
        </div>
        <div class="form-button-group">
            <button class="form-button" type="submit">Enviar</button>
        </div>
    </form>
</div>
